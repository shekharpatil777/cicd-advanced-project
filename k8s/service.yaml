apiVersion: v1
kind: Service
metadata:
  name: cicd-service
  labels:
    app: cicd-app
  annotations:
    description: "Main application service"
spec:
  type: LoadBalancer
  selector:
    app: cicd-app
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
  loadBalancerSourceRanges: []  # Restrict in production
---
apiVersion: v1
kind: Service
metadata:
  name: cicd-service-nodeport
  labels:
    app: cicd-app
    type: nodeport
  annotations:
    description: "NodePort service for internal testing"
spec:
  type: NodePort
  selector:
    app: cicd-app
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30007
    protocol: TCP
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: cicd-service-headless
  labels:
    app: cicd-app
    type: headless
  annotations:
    description: "Headless service for StatefulSet or direct pod access"
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: cicd-app
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
