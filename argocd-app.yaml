apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicd-app
  namespace: argocd
  labels:
    app: cicd-app
spec:
  project: default
  source:
    repoURL: 'https://github.com/shekharpatil777/cicd-advanced-project.git'
    targetRevision: main
    path: k8s
    plugin:
      name: kustomize
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allow:
        empty: false
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
  labels:
    app: argocd
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app: monitoring
